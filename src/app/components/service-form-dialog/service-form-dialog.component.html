<main>
    <fa-icon [icon]="faX" matDialogClose></fa-icon>
    <h1>Registrar Serviço</h1>
    <form>
        <div class="form-left">
            <div id="double-question">
                <div id="question">
                    <label for="insurance">Seguradora:</label>
                    <input type="text" name="seguradora" id="credentials">
                </div>
    
                <div id="question">
                    <label for="assistance">Número de assistência:</label>
                    <input type="text" name="numero_da_assistencia" id="credentials">
                </div>
            </div>
            <div id="single-question">
                <div id="question">
                    <label for="name">Nome completo:</label>
                    <input type="text" name="nome" id="credentials">
                </div>
            </div>
            <div id="double-question">
                <div id="question">
                    <label for="cpf">CPF:</label>
                    <input type="text" name="cpf" id="credentials">
                </div>
    
                <div id="question">
                    <label for="adress">Endereço:</label>
                    <input type="text" name="endereco" id="credentials">
                </div>
            </div>
            <div id="double-question">
                <div id="question">
                    <label for="neighbourhood">Bairro:</label>
                    <input type="text" name="bairro" id="credentials">
                </div>
                <div id="question">
                    <label for="complement">Complemento (opcional):</label>
                    <input type="text" name="complemento" id="credentials">
                </div>
            </div>
        </div>
        <div class="form-right">
            <div class="services-grid">
                <div class="service-row">
                    <input type="checkbox" name="tipo_de_servico" id="service">
                    <label for="eletricista">Eletricista</label>
                </div>
    
                <div class="service-row">
                    <input type="checkbox" name="tipo_de_servico" id="service">
                    <label for="vidraceiro">Vidraceiro</label>    
                </div>
    
                <div class="service-row">
                    <input type="checkbox" name="tipo_de_servico" id="service">
                    <label for="cobertura">Cobertura Provisória</label>
                </div>
    
                <div class="service-row">
                    <input type="checkbox" name="tipo_de_servico" id="service">
                    <label for="hidraulica">Hidráulica</label>
                </div>
    
                <div class="service-row">
                    <input type="checkbox" name="tipo_de_servico" id="service">
                    <label for="vigilancia">Vigilância</label>
                </div>
    
                <div class="service-row">
                    <input type="checkbox" name="tipo_de_servico" id="service">
                    <label for="tapume">Colocação de Tapume</label>
                </div>
    
                <div class="service-row">
                    <input type="checkbox" name="tipo_de_servico" id="service">
                    <label for="entupimento">Entupimento</label>
                </div>
    
                <div class="service-row">
                    <input type="checkbox" name="tipo_de_servico" id="service">
                    <label for="checkup">Check-up</label>
                </div>
    
                <div class="service-row">
                    <input type="checkbox" name="tipo_de_servico" id="chaveiro">
                    <label for="chaveiro">Chaveiro</label>
                </div>

                <div class="another">
                    <label for="outro">Outro...</label>
                    <input type="text" name="tipo_de_servico" id="outro">
                </div>
            </div>
            <div class="problem-description">
                <label for="problem">Descrição do Problema e Serviço a Realizar:</label>
                <textarea name="descricao_problema" id="problem" cols="16" rows="6"></textarea>
            </div>
            <input type="submit" value="Enviar">
        </div>
    </form>
</main>
