<title>Quirino's - Login</title>
<main>
    <div class="left">
        <img src="assets/logoQuirinos.png" alt="">
    </div>
    <div class="right">
        <h1>Login</h1>
        <form>
            <label for="rg">RG:</label>
            <input type="text" name="rg" id="credentials" [(ngModel)]="credentials.rg">
    
            <label for="senha">Senha:</label>
            <input type="password" name="pass" id="credentials" [(ngModel)]="credentials.senha">

            <a (click)="login()"><input type="submit" value="Logar"></a>
        </form>
    </div>
</main>
